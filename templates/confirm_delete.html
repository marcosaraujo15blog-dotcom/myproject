{% extends 'base.html' %}

{% block title %}{{ titulo }} - ERP Logística{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1><i class="bi bi-trash me-2 text-danger"></i>{{ titulo }}</h1>
  </div>
</div>

<div class="form-card" style="max-width:500px">
  <div class="text-center py-3">
    <div class="text-danger mb-3" style="font-size:60px">
      <i class="bi bi-exclamation-triangle-fill"></i>
    </div>
    <h5 class="fw-bold mb-2">Confirmar exclusão</h5>
    <p class="text-muted mb-4">
      Você está prestes a excluir:
      <br><strong class="text-dark">{{ objeto }}</strong>
      <br><span class="text-danger small">Esta ação não pode ser desfeita.</span>
    </p>
  </div>

  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2 justify-content-center">
      <button type="submit" class="btn btn-danger">
        <i class="bi bi-trash me-1"></i> Sim, excluir
      </button>
      <a href="{{ voltar_url }}" class="btn btn-outline-secondary">
        <i class="bi bi-x me-1"></i> Cancelar
      </a>
    </div>
  </form>
</div>
{% endblock %}
