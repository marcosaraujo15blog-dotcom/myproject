<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ERP Logística</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body class="login-page">

<div class="login-card">
  <div class="text-center mb-4">
    <div class="login-logo mb-2"><i class="bi bi-truck"></i></div>
    <div class="login-title">GRF SISTEMAS</div>
    <div class="login-sub">Central de Operação Logística</div>
  </div>

  {% if form.errors %}
  <div class="alert alert-danger py-2">
    <i class="bi bi-exclamation-triangle me-2"></i>
    Usuário ou senha incorretos. Tente novamente.
  </div>
  {% endif %}

  <form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Usuário</label>
      {{ form.username }}
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Senha</label>
      {{ form.password }}
    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
      <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
    </button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
